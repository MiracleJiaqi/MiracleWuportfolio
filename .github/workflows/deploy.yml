name: 部署到京东云

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 安装 pnpm
      uses: pnpm/action-setup@v4

    - name: 安装依赖
      run: pnpm install --frozen-lockfile

    - name: 清除构建缓存
      run: rm -rf dist node_modules/.vite

    - name: 构建项目
      run: pnpm build

    - name: 部署到服务器
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: 36.151.148.84
        REMOTE_USER: root
        SOURCE: "dist/"
        TARGET: "/PersonalWeb/dist"
        ARGS: "-avzr --delete"
        SCRIPT_AFTER: |
          echo "📦 文件已上传"

          # 安装 pm2（若未安装）
          npm install -g pm2 --quiet 2>/dev/null || true

          # 让 dist/index.js 以 ES Module 模式运行
          echo '{"type":"module"}' > /PersonalWeb/dist/package.json

          # 启动或重启 Node.js 服务（监听 3000 端口）
          pm2 restart portfolio --update-env 2>/dev/null || pm2 start /PersonalWeb/dist/index.js --name portfolio
          pm2 save --force

          # 更新 Nginx 配置，增加 /api/ 代理
          docker exec GSManager3 bash -c "cat > /etc/nginx/sites-enabled/portfolio << 'NGINXEOF'
          server {
              listen 80;
              server_name _;
              root /PersonalWeb/dist/public;
              index index.html;

              location /api/ {
                  proxy_pass http://172.17.0.1:3000;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
              }

              location / {
                  try_files \$uri \$uri/ /index.html;
              }
          }
          NGINXEOF"

          # 重载 Nginx
          docker exec GSManager3 nginx -s reload
          echo "✅ 部署完成！Node.js 已启动，Nginx 已重载"
