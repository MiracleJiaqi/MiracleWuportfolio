name: 部署到京东云

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 安装 pnpm
      uses: pnpm/action-setup@v4

    - name: 获取 pnpm 存储目录
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: 设置 pnpm 缓存
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: 安装依赖
      run: pnpm install --frozen-lockfile

    - name: 构建项目
      run: pnpm build

    - name: 设置 SSH 密钥
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -t ed25519 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: 部署到服务器
      run: |
        echo "=== 开始部署 ==="
        
        # 上传文件
        echo "=== 上传文件到服务器 ==="
        ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "mkdir -p /PersonalWeb/dist/public && chmod -R 755 /PersonalWeb"
        
        # 使用 rsync 同步文件
        rsync -avz -e "ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10" \
          dist/public/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/PersonalWeb/dist/public/
        
        echo "=== 验证 Nginx 配置 ==="
        ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOSSH'
          # 检查 Nginx 配置是否正确
          if grep -q "root /PersonalWeb/dist/public" /etc/nginx/sites-available/portfolio; then
            echo "✅ Nginx 配置正确"
          else
            echo "⚠️ 修复 Nginx 配置..."
            sudo sed -i 's|root /PersonalWeb/dist;|root /PersonalWeb/dist/public;|g' /etc/nginx/sites-available/portfolio
            echo "✅ Nginx 配置已修复"
          fi
          
          # 验证 Nginx 语法
          echo "=== 验证 Nginx 语法 ==="
          sudo nginx -t
          
          # 重启 Nginx
          echo "=== 重启 Nginx ==="
          sudo service nginx reload || sudo /etc/init.d/nginx reload
          
          # 验证部署
          echo "=== 验证部署 ==="
          echo "文件大小:"
          ls -lh /PersonalWeb/dist/public/index.html
          echo ""
          echo "首行内容:"
          head -1 /PersonalWeb/dist/public/index.html
          
          echo "✅ 部署完成"
        EOSSH

    - name: 部署失败处理
      if: failure()
      run: |
        echo "❌ 部署失败，请检查日志"
        exit 1
