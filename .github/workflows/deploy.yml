name: 部署到京东云

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 安装 pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: 获取 pnpm 存储目录
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: 设置 pnpm 缓存
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: 安装依赖
      run: pnpm install --frozen-lockfile

    - name: 构建项目
      run: pnpm build

    - name: 部署到服务器
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: "36.151.148.84"
        REMOTE_USER: ${{ secrets.SERVER_USER }}
        SOURCE: "dist/"
        TARGET: "/PersonalWeb/dist"
        ARGS: "-avzr --delete"
        SCRIPT_BEFORE: |
          echo "=== 部署目标服务器 ==="
          hostname
          date
          mkdir -p /PersonalWeb/dist
          chmod -R 755 /PersonalWeb
        SCRIPT_AFTER: |
          echo "=== 同步文件到 Docker 容器 ==="
          docker exec GSManager3 rm -rf /PersonalWeb/dist/*
          docker cp /PersonalWeb/dist/. GSManager3:/PersonalWeb/dist/
          echo "=== 重启 Nginx ==="
          docker exec GSManager3 pkill -9 nginx || true
          docker exec GSManager3 nginx
          echo "=== 验证部署 ==="
          docker exec GSManager3 ls -la /PersonalWeb/dist/
          docker exec GSManager3 head -5 /PersonalWeb/dist/index.html
