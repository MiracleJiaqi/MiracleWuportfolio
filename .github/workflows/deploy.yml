name: 部署到京东云

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 安装 pnpm
      uses: pnpm/action-setup@v4

    - name: 安装依赖
      run: pnpm install --frozen-lockfile

    - name: 清除构建缓存
      run: rm -rf dist node_modules/.vite

    - name: 构建项目
      run: pnpm build

    - name: 清空服务器旧文件
      uses: appleboy/ssh-action@master
      with:
        host: 36.151.148.84
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          rm -rf /PersonalWeb/dist/*
          mkdir -p /PersonalWeb/dist

    - name: 上传文件到服务器
      uses: appleboy/scp-action@master
      with:
        host: 36.151.148.84
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "dist/*"
        target: "/PersonalWeb/"
        strip_components: 0

    - name: 重启服务
      uses: appleboy/ssh-action@master
      with:
        host: 36.151.148.84
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          pkill -f "node dist/index.js" || true
          cd /PersonalWeb
          nohup node dist/index.js > app.log 2>&1 &
          echo "✅ 部署完成"
