name: 部署到京东云

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 安装 pnpm
      uses: pnpm/action-setup@v4

    - name: 获取 pnpm 存储目录
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: 设置 pnpm 缓存
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: 安装依赖
      run: pnpm install --frozen-lockfile

    - name: 构建项目
      run: pnpm build

    - name: 部署到服务器
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.SERVER_HOST }}
        REMOTE_USER: ${{ secrets.SERVER_USER }}
        SOURCE: "dist/public/"
        TARGET: "/PersonalWeb/dist/public"
        ARGS: "-avzr --delete"
        SCRIPT_BEFORE: |
          echo "=== 准备部署目录 ==="
          mkdir -p /PersonalWeb/dist/public
          chmod -R 755 /PersonalWeb
        SCRIPT_AFTER: |
          echo "=== 验证 Nginx 配置 ==="
          if ! grep -q "root /PersonalWeb/dist/public" /etc/nginx/sites-available/portfolio; then
            echo "修复 Nginx 配置..."
            sudo sed -i 's|root /PersonalWeb/dist;|root /PersonalWeb/dist/public;|g' /etc/nginx/sites-available/portfolio
          fi
          
          echo "=== 验证 Nginx 语法 ==="
          sudo nginx -t
          
          echo "=== 重启 Nginx ==="
          sudo service nginx reload || sudo /etc/init.d/nginx reload
          
          echo "=== 验证部署 ==="
          echo "文件大小:"
          ls -lh /PersonalWeb/dist/public/index.html
          echo "✅ 部署完成"
